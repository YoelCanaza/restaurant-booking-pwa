name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Tipos (tsc)
        run: npx tsc --noEmit

      - name: Lint (eslint)
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Valores dummy: el build solo verifica que compila; el artefacto
          # de producción lo genera Vercel con las env vars reales.
          VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: ci-placeholder
